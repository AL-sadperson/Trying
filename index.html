<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة أعمال داينمو</title>
<style>
    /* إعدادات الصفحة الأساسية */
    body {
        background-color: #0d0d0d;
        color: #fff;
        font-family: 'Courier New', Courier, monospace; /* خط يعطي طابعاً سرياً/تقنياً */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* حاوية البطاقة */
    .card-container {
        perspective: 1000px; /* لإنشاء البعد الثلاثي */
        width: 400px;
        height: 250px;
        cursor: pointer;
    }

    /* الجزء الداخلي الذي يتحرك */
    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-style: preserve-3d;
    }

    /* كلاس الانقلاب يتم تفعيله بواسطة الجافاسكريبت */
    .card-container.flipped .card-inner {
        transform: rotateY(180deg);
    }

    /* خصائص الوجهين المشتركة */
    .card-front, .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden; /* إخفاء الوجه الآخر عند الدوران */
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
        box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
    }

    /* الوجه الأمامي */
    .card-front {
        background: #f4f4f4;
        color: #111;
        border: 4px solid #ff0033; /* لون أحمر مستوحى من الشعار */
    }

    /* تنسيق الشعار الأمامي (استبدل src بمسار صورتك) */
    .logo-img {
        width: 100px;
        height: auto;
        margin-bottom: 10px;
        filter: drop-shadow(2px 2px 0px #ffcc00); /* ظل أصفر لتعزيز الشعار */
    }

    .card-front h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 2px;
    }

    .card-front p {
        margin-top: 5px;
        font-size: 14px;
        font-weight: bold;
        color: #555;
    }

    /* الوجه الخلفي */
    .card-back {
        background: #1a1a1a;
        color: #ffcc00; /* لون أصفر مستوحى من الشعار */
        transform: rotateY(180deg);
        border: 4px solid #ffcc00;
    }

    .card-back h2 {
        margin: 0 0 15px 0;
        font-size: 20px;
        border-bottom: 1px dashed #ff0033;
        padding-bottom: 5px;
        color: #ff0033;
    }

    .info-line {
        margin: 5px 0;
        font-size: 14px;
        width: 100%;
        text-align: right;
        display: flex;
        justify-content: space-between;
    }

    .info-line span {
        color: #fff;
    }

    /* زر الأرشيف */
    .archive-btn {
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #ff0033;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
        font-size: 14px;
        transition: all 0.3s ease;
        border: 1px solid #ff0033;
        cursor: pointer;
    }

    .archive-btn:hover {
        background-color: transparent;
        color: #ff0033;
        box-shadow: 0 0 15px rgba(255, 0, 51, 0.6) inset;
    }
</style>
</head>
<body>

    <div class="card-container" onclick="toggleCard(this)">
        <div class="card-inner">
            
            <div class="card-front">
                <img src="YOUR_LOGO_URL_HERE.png" alt="شعار داينمو" class="logo-img">
                <h1>داينمو</h1>
                <p>نتعامل مع مشاكلكم في الكون المتعدد</p>
            </div>

            <div class="card-back">
                <h2>إدارة الشذوذ الزمني</h2>
                <div class="info-line"><strong>التردد الزمني:</strong> <span>+∞ 888-DYN-00</span></div>
                <div class="info-line"><strong>البريد الفضائي:</strong> <span>void@dynamo.inc</span></div>
                <div class="info-line"><strong>الموقع:</strong> <span>البعد 137، قطاع ألفا</span></div>
                
                <button class="archive-btn" onclick="openArchive(event)">الوصول إلى الأرشيف السري</button>
            </div>

        </div>
    </div>

    <script>
        // دالة لقلب البطاقة
        function toggleCard(element) {
            element.classList.toggle('flipped');
        }

        // دالة لزر الأرشيف
        function openArchive(event) {
            // منع الحدث من الوصول للبطاقة وقلبها عند الضغط على الزر
            event.stopPropagation(); 
            
            // هنا يمكنك وضع رابط الأرشيف الخاص بك
            alert("جارٍ فك التشفير... جاري الاتصال بأرشيف داينمو للكون المتعدد.");
            // window.location.href = 'archive_page.html'; // قم بإزالة التعليق لتفعيل الانتقال لصفحة أخرى
        }
    </script>

</body>
</html>
